# Linear Transformer Configuration

model:
  vocab_size: 256
  dim: 128
  num_layers: 4
  num_heads: 8
  kernel_type: "elu"
  dropout: 0.1
  max_seq_len: 4096

attention:
  use_hybrid: false
  window_size: 64

training:
  batch_size: 32
  num_epochs: 10
  learning_rate: 1e-3
  weight_decay: 1e-5
  warmup_epochs: 1
  gradient_clip: 1.0

data:
  seq_len: 256
  train_split: 0.8

generation:
  temperature: 0.8
  top_k: 50
  top_p: 0.95
  max_length: 100

device: "cuda"
